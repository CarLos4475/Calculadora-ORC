      var API_BASE = '';
      var saturationData = null;

      async function loadSaturationDome(fluido) {
        try {
          var resp = await fetch(API_BASE + '/diagrama/' + encodeURIComponent(fluido));
          if (!resp.ok) return;
          saturationData = await resp.json();
          renderTsChart(null);
        } catch (e) { console.warn('No se pudo cargar la campana:', e); }
      }

      function renderTsChart(estados) {
        var traces = [];
        if (saturationData && saturationData.saturacion) {
          var sat = saturationData.saturacion;
          traces.push({ x: sat.liquido.s, y: sat.liquido.T, mode: 'lines', name: 'Líquido saturado', line: { color: '#94a3b8', width: 1.5 }, hoverinfo: 'skip' });

          var lines = [

            { a: '1', b: '2', name: '1→2 (real)', color: '#ef4444', dash: 'solid' },
            { a: '3', b: '4s', name: '3→4s (isentrópica)', color: '#22c55e', dash: 'dash' },
            { a: '3', b: '4', name: '3→4 (real)', color: '#3b82f6', dash: 'solid' },
            { a: '4', b: '1', name: '4→1 (evaporación)', color: '#f97316', dash: 'solid' },

            var k = order[j], st = estados[k];

          xaxis: { title: { text: 's [kJ/kg·K]', font: { size: 12 } }, gridcolor: '#e2e8f0', tickfont: { size: 11, family: 'JetBrains Mono, monospace' } },

          paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)', font: { family: 'Inter, system-ui, sans-serif' }, hovermode: 'closest',
          config: { displayModeBar: 'hover', modeBarButtonsToRemove: ['lasso2d', 'select2d', 'zoomIn2d', 'zoomOut2d', 'autoScale2d'], displaylogo: false, responsive: true }
        }, { responsive: true });
      }

      function updateResults(estados, pt, pb, pn) {

        var html = '';

          html += '<tr class="border-b border-gray-100 hover:bg-gray-50/50 ' + rc + '"><td class="px-4 py-2.5 font-sans font-semibold ' + lc + '">' + k + '</td><td class="px-4 py-2.5 text-right">' + fmt2(st.P) + '</td><td class="px-4 py-2.5 text-right">' + fmt2(st.T) + '</td><td class="px-4 py-2.5 text-right">' + fmt2(st.h) + '</td><td class="px-4 py-2.5 text-right">' + fmt2(st.s) + '</td><td class="px-4 py-2.5 text-right">' + fmtX(st.x) + '</td></tr>';
        }

        document.getElementById('potencia-turbina').innerHTML = fmt2(pt) + ' <span class="text-sm text-primary-400">kW</span>';
        document.getElementById('potencia-bomba').innerHTML = fmt2(pb) + ' <span class="text-sm text-primary-400">kW</span>';

        e.preventDefault(); clearErrors();
        var payload = {
          fluido: fluidoSelect.value,
          p_entrada: parseFloat(document.getElementById('p_entrada').value),
          t_entrada: parseFloat(document.getElementById('t_entrada').value),
          p_salida: parseFloat(document.getElementById('p_salida').value),
          eficiencia_turbina: parseFloat(document.getElementById('eficiencia_turbina').value),
          eficiencia_bomba: parseFloat(document.getElementById('eficiencia_bomba').value),
          gasto_masico: parseFloat(document.getElementById('gasto_masico').value)
        };
        setLoading(true);
        try {
          var resp = await fetch(API_BASE + '/calcular', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });

          renderTsChart(result.estados);
        } catch (err) { alert('Error de conexión: ' + err.message); }
        finally { setLoading(false); }
      });

      fluidoSelect.addEventListener('change', function () { loadSaturationDome(fluidoSelect.value); });
      loadSaturationDome(fluidoSelect.value);
    })();
